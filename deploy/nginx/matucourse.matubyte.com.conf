# matucourse.matubyte.com — MatuCourse Vue SPA (archivos estáticos en dist/)

server {
    listen 80;
    listen [::]:80;
    server_name matucourse.matubyte.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name matucourse.matubyte.com;

    ssl_certificate /etc/letsencrypt/live/matucourse.matubyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matucourse.matubyte.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /root/apps/matucourse/dist;
    index index.html;

    client_max_body_size 2m;

    # JS modules — evita MIME incorrecto en algunos proxies
    types {
        application/javascript js mjs;
        text/css css;
        image/png png;
        image/jpeg jpg jpeg;
        image/svg+xml svg;
        image/x-icon ico;
        font/woff2 woff2;
    }

    # Nunca servir código fuente TypeScript en producción
    location ^~ /src/ {
        return 404;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /logo.png {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
