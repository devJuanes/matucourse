# HTTP (antes de SSL) — matucourse.matubyte.com

server {
    listen 80;
    listen [::]:80;
    server_name matucourse.matubyte.com;

    root /root/apps/matucourse/dist;
    index index.html;

    client_max_body_size 2m;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    types {
        application/javascript js mjs;
    }

    location ^~ /src/ {
        return 404;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
